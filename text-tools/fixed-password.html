<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../things/fixed-icon.svg">
    <title>固定密码</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* 返回链接 */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #00d2ff;
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 16px;
            transition: color 0.2s, text-shadow 0.2s;
        }

        .back-link:hover {
            color: #7df9ff;
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.5);
        }

        /* 标题 */
        .main-title {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 24px;
            letter-spacing: 2px;
            text-shadow: 0 0 12px rgba(0, 210, 255, 0.3);
        }

        /* 搜索栏 */
        .search-bar {
            position: relative;
            margin-bottom: 24px;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            font-size: 1rem;
            font-family: inherit;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 12px;
            color: #e0e0e0;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input::placeholder {
            color: #666;
        }

        .search-input:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 12px rgba(0, 210, 255, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            color: #666;
            pointer-events: none;
        }

        /* 工具网格 */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            transition: opacity 0.3s ease;
        }

        .tools-grid.hidden {
            display: none;
        }

        /* 工具卡片 */
        .tool-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tool-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(0, 210, 255, 0.4);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .tool-card.hidden {
            display: none;
        }

        .tool-icon {
            font-size: 2rem;
            margin-bottom: 8px;
            display: block;
        }

        .tool-name {
            font-size: 0.9rem;
            color: #e0e0e0;
        }

        /* 工作区 */
        .workspace {
            position: relative;
            min-height: 400px;
        }

        /* 面板容器 */
        .panels-container {
            display: flex;
            gap: 16px;
            width: 100%;
        }

        .panels-container.single {
            max-width: 100%;
        }

        .panels-container.dual {
            max-width: 100%;
        }

        /* 单面板时居中 */
        .panels-container.single .panel-wrapper:only-child {
            margin: 0 auto;
        }

        /* 面板 */
        .panel-wrapper {
            flex: 1;
            min-width: 0;
            max-width: 100%;
            animation: panelEnter 0.3s ease;
        }

        @keyframes panelEnter {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            min-height: 350px;
        }

        /* 面板标签页（类似活页本） */
        .panel-tab {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(0, 210, 255, 0.1);
            border-bottom: 1px solid rgba(0, 210, 255, 0.2);
        }

        .panel-tab-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-tab protrusion {
            background: rgba(0, 210, 255, 0.15);
            padding: 4px 12px 4px 16px;
            border-radius: 4px 0 0 4px;
            font-size: 0.9rem;
            color: #00d2ff;
            position: relative;
        }

        .panel-tab protrusion::after {
            content: '';
            position: absolute;
            right: -10px;
            top: 0;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 14px 0 14px 10px;
            border-color: transparent transparent transparent rgba(0, 210, 255, 0.15);
        }

        .panel-tab-icon {
            font-size: 1.2rem;
        }

        .panel-close {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            border-radius: 6px;
            color: #666;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .panel-close:hover {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
        }

        /* 面板内容 */
        .panel-content {
            padding: 20px;
            color: #aaa;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .panel-placeholder {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .panel-placeholder-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* 添加按钮 */
        .add-panel-btn {
            position: fixed;
            right: 24px;
            bottom: 24px;
            width: 56px;
            height: 56px;
            background: rgba(0, 210, 255, 0.15);
            border: 1px solid rgba(0, 210, 255, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #00d2ff;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            z-index: 100;
        }

        .add-panel-btn:hover {
            background: rgba(0, 210, 255, 0.25);
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 210, 255, 0.3);
        }

        .add-panel-btn:active {
            transform: scale(0.95);
        }

        .add-panel-btn.hidden {
            display: none;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #666;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        /* 响应式 */
        @media (max-width: 599px) {
            .main-title {
                font-size: 1.3rem;
            }

            .tools-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .panel-wrapper {
                width: 100%;
            }

            .panels-container.dual {
                flex-direction: column;
            }

            .add-panel-btn {
                right: 16px;
                bottom: 16px;
                width: 48px;
                height: 48px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-link">← 返回工具箱</a>
        <h1 class="main-title">固定密码</h1>

        <!-- 搜索栏 -->
        <div class="search-bar" id="searchBar">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="搜索密码类型...">
        </div>

        <!-- 工具网格 -->
        <div class="tools-grid" id="toolsGrid">
            <div class="tool-card" data-tool="morse">
                <span class="tool-icon">📡</span>
                <span class="tool-name">摩斯密码</span>
            </div>
            <div class="tool-card" data-tool="semaphore">
                <span class="tool-icon">🚩</span>
                <span class="tool-name">旗语</span>
            </div>
            <div class="tool-card" data-tool="pigpen">
                <span class="tool-icon">⬛</span>
                <span class="tool-name">猪圈密码</span>
            </div>
            <div class="tool-card" data-tool="bacon">
                <span class="tool-icon">BA</span>
                <span class="tool-name">培根密码</span>
            </div>
            <div class="tool-card" data-tool="rot">
                <span class="tool-icon">🔄</span>
                <span class="tool-name">ROT13</span>
            </div>
            <div class="tool-card" data-tool="a1z26">
                <span class="tool-icon">🔢</span>
                <span class="tool-name">A1Z26</span>
            </div>
            <div class="tool-card" data-tool="binary">
                <span class="tool-icon">💻</span>
                <span class="tool-name">二进制</span>
            </div>
            <div class="tool-card" data-tool="hex">
                <span class="tool-icon">🔤</span>
                <span class="tool-name">十六进制</span>
            </div>
        </div>

        <!-- 工作区 -->
        <div class="workspace" id="workspace">
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">🔐</div>
                <p>点击上方工具卡片开始使用</p>
            </div>
            <div class="panels-container" id="panelsContainer"></div>
        </div>
    </div>

    <!-- 添加面板按钮 -->
    <button class="add-panel-btn hidden" id="addPanelBtn" title="添加面板">+</button>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBar = document.getElementById('searchBar');
        const toolsGrid = document.getElementById('toolsGrid');
        const emptyState = document.getElementById('emptyState');
        const panelsContainer = document.getElementById('panelsContainer');
        const addPanelBtn = document.getElementById('addPanelBtn');

        const toolData = {
            morse: { name: '摩斯密码', icon: '📡' },
            semaphore: { name: '旗语', icon: '🚩' },
            pigpen: { name: '猪圈密码', icon: '⬛' },
            bacon: { name: '培根密码', icon: 'BA' },
            rot: { name: 'ROT13', icon: '🔄' },
            a1z26: { name: 'A1Z26', icon: '🔢' },
            binary: { name: '二进制', icon: '💻' },
            hex: { name: '十六进制', icon: '🔤' }
        };

        let activePanels = [];
        let currentToolIndex = 0;

        // 搜索过滤
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.tool-card');

            cards.forEach(card => {
                const name = card.querySelector('.tool-name').textContent.toLowerCase();
                if (name.includes(query) || query === '') {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        });

        // 创建面板
        function createPanel(toolKey) {
            const tool = toolData[toolKey];
            const panelId = `panel-${currentToolIndex++}`;

            const wrapper = document.createElement('div');
            wrapper.className = 'panel-wrapper';
            wrapper.id = panelId;

            wrapper.innerHTML = `
                <div class="panel">
                    <div class="panel-tab">
                        <div class="panel-tab-left">
                            <protrusion>${tool.name}</protrusion>
                            <span class="panel-tab-icon">${tool.icon}</span>
                        </div>
                        <button class="panel-close" data-panel="${panelId}">×</button>
                    </div>
                    <div class="panel-content">
                        <div class="panel-placeholder">
                            <div class="panel-placeholder-icon">${tool.icon}</div>
                            <p>${tool.name} 工具</p>
                            <p style="margin-top: 8px; color: #555; font-size: 0.85rem;">功能开发中...</p>
                        </div>
                    </div>
                </div>
            `;

            return { id: panelId, key: toolKey, element: wrapper };
        }

        // 添加面板
        function addPanel(toolKey) {
            if (activePanels.length >= 2) return;

            const panel = createPanel(toolKey);
            activePanels.push(panel);
            panelsContainer.appendChild(panel.element);

            updateLayout();
            bindPanelEvents();

            // 如果是第一个面板，隐藏工具网格
            if (activePanels.length === 1) {
                toolsGrid.classList.add('hidden');
                emptyState.style.display = 'none';
                searchBar.style.display = 'none';
            }
        }

        // 关闭面板
        function closePanel(panelId) {
            const index = activePanels.findIndex(p => p.id === panelId);
            if (index === -1) return;

            const panel = activePanels[index];
            panel.element.style.animation = 'panelEnter 0.2s ease reverse';

            setTimeout(() => {
                panel.element.remove();
                activePanels.splice(index, 1);
                updateLayout();

                // 如果没有面板了，显示工具网格
                if (activePanels.length === 0) {
                    toolsGrid.classList.remove('hidden');
                    emptyState.style.display = 'block';
                    searchBar.style.display = 'block';
                }
            }, 200);
        }

        // 更新布局
        function updateLayout() {
            if (activePanels.length === 2) {
                panelsContainer.className = 'panels-container dual';
            } else if (activePanels.length === 1) {
                panelsContainer.className = 'panels-container single';
            } else {
                panelsContainer.className = '';
            }

            // 更新添加按钮
            if (activePanels.length >= 2) {
                addPanelBtn.classList.add('hidden');
            } else if (activePanels.length > 0) {
                addPanelBtn.classList.remove('hidden');
            } else {
                addPanelBtn.classList.add('hidden');
            }
        }

        // 绑定面板事件
        function bindPanelEvents() {
            document.querySelectorAll('.panel-close').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const panelId = e.target.dataset.panel;
                    closePanel(panelId);
                });
            });
        }

        // 添加工具卡片点击事件
        document.querySelectorAll('.tool-card').forEach(card => {
            card.addEventListener('click', () => {
                const toolKey = card.dataset.tool;
                addPanel(toolKey);
            });
        });

        // 添加按钮点击事件
        addPanelBtn.addEventListener('click', () => {
            // 显示工具网格让用户选择
            if (activePanels.length > 0) {
                toolsGrid.classList.remove('hidden');
                emptyState.style.display = 'none';
                searchBar.style.display = 'block';
                // 关闭添加按钮
                addPanelBtn.classList.add('hidden');
            }
        });

        // 工具网格点击外部时恢复
        document.addEventListener('click', (e) => {
            if (activePanels.length > 0) {
                const isToolCard = e.target.closest('.tool-card');
                const isAddBtn = e.target.closest('.add-panel-btn');
                const isPanel = e.target.closest('.panel');

                if (!isToolCard && !isAddBtn && !isPanel) {
                    // 点击空白区域，保持面板显示
                }
            }
        });
    </script>
</body>
</html>
