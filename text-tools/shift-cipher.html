<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            var key = "theme_manual_override";
            var theme = null;
            try {
                var saved = window.localStorage.getItem(key);
                if (saved === "light" || saved === "dark") theme = saved;
            } catch (_) {}
            if (!theme) {
                var hour = new Date().getHours();
                theme = (hour >= 19 || hour < 7) ? "dark" : "light";
            }
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
    <link rel="icon" type="image/svg+xml" href="../things/shift-icon.svg">
    <title>移位</title>
    <link rel="stylesheet" href="../theme/light-theme.css">
    <link rel="stylesheet" href="../theme/dark-theme.css">
    <link rel="stylesheet" href="../theme/common-styles.css">
    <style>

        .main-panel {
            padding: 18px;
        }

        .offset-area {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: var(--surface-3);
            margin-bottom: 14px;
        }

        .offset-label {
            font-size: 0.92rem;
            color: var(--text-sub);
        }

        #offsetInput {
            width: 128px;
            min-height: 44px;
            text-align: center;
            appearance: textfield;
        }

        #offsetInput::-webkit-inner-spin-button,
        #offsetInput::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .checkbox-area {
            margin-bottom: 14px;
            color: var(--text-sub);
        }

        .checkbox-area label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            min-height: 44px;
        }

        .convert-row {
            display: grid;
            gap: 10px;
        }

        .btn-area {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .text-input {
            min-height: 116px;
            resize: vertical;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 12px;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-sub);
            transition: color 0.2s ease;
        }

        .modal-close:hover {
            color: var(--danger);
        }

        .modal-title {
            margin: 0 0 10px;
            color: var(--text-main);
        }

        .modal-body p {
            margin: 0 0 8px;
            color: var(--text-sub);
        }

        .offset-area.error {
            border-color: color-mix(in srgb, var(--danger) 68%, transparent);
            animation: shake 0.25s linear;
        }

        @media (max-width: 600px) {
            .main-panel {
                padding: 14px;
            }

            .btn-area {
                grid-template-columns: 1fr;
            }

            #offsetInput {
                width: 110px;
            }
        }
    </style>
</head>
<body>
    <div class="container tool-container page-enter">
        <a href="../index.html" class="back-link">← 返回工具箱</a>
        <h1 class="main-title">
            <span class="title-wrap">SHIFT<span class="help-icon" id="helpBtn" title="查看帮助">🤔</span></span>
        </h1>

        <div class="main-panel" id="mainPanel">
            <div class="offset-area" id="offsetArea">
                <span class="offset-label">OFFSET</span>
                <input type="number" class="text-input" id="offsetInput" value="3" min="-25" max="25" step="1">
            </div>

            <div class="checkbox-area">
                <label><input type="checkbox" id="shiftDigits"> 同时移位数字（0-9）</label>
            </div>

            <div class="convert-row">
                <textarea class="text-input" id="cipherText" placeholder="输入密文..." rows="3"></textarea>
                <div class="btn-area">
                    <button class="btn btn-decrypt" id="decryptBtn">↓ 解密</button>
                    <button class="btn btn-encrypt" id="encryptBtn">↑ 加密</button>
                </div>
                <textarea class="text-input" id="plainText" placeholder="输入明文..." rows="3"></textarea>
            </div>
        </div>
    </div>

    <div class="modal" id="helpModal">
        <div class="modal-content">
            <span class="modal-close" id="closeModal">&times;</span>
            <h2 class="modal-title">使用说明</h2>
            <div class="modal-body">
                <p>1. 在 OFFSET 中输入偏移量（-25 到 25，且不能为 0）。</p>
                <p>2. 在下方输入密文后点击“↓ 解密”，或输入明文点击“↑ 加密”。</p>
                <p>3. 勾选“同时移位数字”时，数字也会参与循环移位。</p>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../theme/theme-system.js"></script>
    <script>
        initThemeManager({ allowToggle: false });

        const helpBtn = document.getElementById('helpBtn');
        const helpModal = document.getElementById('helpModal');
        const closeModal = document.getElementById('closeModal');
        const offsetInput = document.getElementById('offsetInput');
        const offsetArea = document.getElementById('offsetArea');
        const cipherText = document.getElementById('cipherText');
        const plainText = document.getElementById('plainText');
        const shiftDigits = document.getElementById('shiftDigits');
        const decryptBtn = document.getElementById('decryptBtn');
        const encryptBtn = document.getElementById('encryptBtn');
        const toast = document.getElementById('toast');

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2600);
        }

        function shakeOffsetArea() {
            offsetArea.classList.add('error');
            setTimeout(() => offsetArea.classList.remove('error'), 320);
        }

        function shakeInput(input) {
            input.classList.add('error');
            setTimeout(() => input.classList.remove('error'), 320);
        }

        function shakeBtn(btn) {
            btn.classList.add('error');
            setTimeout(() => btn.classList.remove('error'), 320);
        }

        function validateOffset() {
            const value = parseInt(offsetInput.value, 10);
            if (Number.isNaN(value)) {
                shakeOffsetArea();
                showToast('偏移量必须是整数！');
                return null;
            }
            if (value < -25 || value > 25) {
                shakeOffsetArea();
                showToast('偏移量范围为 -25 ~ 25！');
                return null;
            }
            if (value === 0) {
                shakeOffsetArea();
                showToast('偏移量为 0 没有意义！');
                return null;
            }
            return value;
        }

        function shiftChar(char, offset) {
            const code = char.charCodeAt(0);
            if (code >= 65 && code <= 90) {
                return String.fromCharCode(((code - 65 + offset) % 26 + 26) % 26 + 65);
            }
            if (code >= 97 && code <= 122) {
                return String.fromCharCode(((code - 97 + offset) % 26 + 26) % 26 + 97);
            }
            if (shiftDigits.checked && code >= 48 && code <= 57) {
                return String.fromCharCode(((code - 48 + offset) % 10 + 10) % 10 + 48);
            }
            return char;
        }

        function convert(text, offset) {
            let result = '';
            for (const char of text) {
                result += shiftChar(char, offset);
            }
            return result;
        }

        function encrypt() {
            const offset = validateOffset();
            if (offset === null) {
                shakeBtn(encryptBtn);
                return;
            }
            if (plainText.value.trim() === '') {
                shakeInput(plainText);
                shakeBtn(encryptBtn);
                showToast('你没有输入明文！');
                return;
            }
            cipherText.value = convert(plainText.value, offset);
        }

        function decrypt() {
            const offset = validateOffset();
            if (offset === null) {
                shakeBtn(decryptBtn);
                return;
            }
            if (cipherText.value.trim() === '') {
                shakeInput(cipherText);
                shakeBtn(decryptBtn);
                showToast('你没有输入密文！');
                return;
            }
            plainText.value = convert(cipherText.value, -offset);
        }

        helpBtn.addEventListener('click', () => helpModal.classList.add('show'));
        closeModal.addEventListener('click', () => helpModal.classList.remove('show'));
        helpModal.addEventListener('click', (e) => {
            if (e.target === helpModal) helpModal.classList.remove('show');
        });

        offsetInput.addEventListener('blur', validateOffset);
        decryptBtn.addEventListener('click', decrypt);
        encryptBtn.addEventListener('click', encrypt);
    </script>
</body>
</html>
