<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>移位</title>
    <style>
        /* ============================================
           移位 - 样式表
           ============================================ */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 24px;
        }

        /* 返回链接 */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #00d2ff;
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 16px;
            transition: color 0.2s, text-shadow 0.2s;
        }

        .back-link:hover {
            color: #7df9ff;
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.5);
        }

        /* 标题 */
        .main-title {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 24px;
            letter-spacing: 2px;
            text-shadow: 0 0 12px rgba(0, 210, 255, 0.3);
        }

        .help-icon {
            margin-left: 12px;
            cursor: pointer;
            font-size: 1.2rem;
            vertical-align: middle;
            transition: transform 0.2s;
        }

        .help-icon:hover {
            transform: scale(1.2);
        }

        /* 弹窗样式 */
        .modal {
            visibility: hidden;
            opacity: 0;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0);
            z-index: 2000;
            transition: opacity 0.3s ease, background 0.3s ease;
        }

        .modal.show {
            visibility: visible;
            opacity: 1;
            background: rgba(0, 0, 0, 0.7);
        }

        .modal-content {
            background: #1a1a2e;
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 12px;
            padding: 24px;
            max-width: 480px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.1);
        }

        .modal:not(.show) .modal-content {
            transform: translate(-50%, calc(-50% + 20px));
            opacity: 0;
        }

        .modal.show .modal-content {
            transform: translate(-50%, -50%);
            opacity: 1;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
            line-height: 1;
        }

        .modal-close:hover {
            color: #00d2ff;
        }

        .modal-title {
            font-size: 1.1rem;
            color: #00d2ff;
            margin-bottom: 16px;
            text-align: center;
        }

        .modal-body p {
            margin-bottom: 12px;
            line-height: 1.7;
            color: #aaa;
            font-size: 0.85rem;
        }

        .modal-body strong {
            color: #e0e0e0;
        }

        /* 主体区域 */
        .main-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
        }

        /* 控制行 */
        .control-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .offset-label {
            font-size: 0.8rem;
            color: #00d2ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .offset-input {
            width: 64px;
            padding: 8px 12px;
            font-size: 1rem;
            font-family: inherit;
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 6px;
            color: #fff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: textfield;
        }

        .offset-input::-webkit-inner-spin-button,
        .offset-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .offset-input:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 8px rgba(0, 210, 255, 0.3);
        }

        .offset-input.error {
            border-color: #ff4757;
            animation: shake 0.4s ease;
        }

        .checkbox-area {
            display: flex;
            align-items: center;
            margin-left: auto;
        }

        .checkbox-area label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #888;
            transition: color 0.2s;
        }

        .checkbox-area label:hover {
            color: #bbb;
        }

        .checkbox-area input[type="checkbox"] {
            width: 14px;
            height: 14px;
            cursor: pointer;
            accent-color: #00d2ff;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-6px);
            }

            40%,
            80% {
                transform: translateX(6px);
            }
        }

        /* 文本输入 */
        .text-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 0.9rem;
            font-family: inherit;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #e0e0e0;
            outline: none;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .text-input::placeholder {
            color: #555;
        }

        .text-input:focus {
            border-color: rgba(0, 210, 255, 0.4);
            box-shadow: 0 0 12px rgba(0, 210, 255, 0.1);
        }

        .text-input.error {
            border-color: #ff4757;
            animation: shake 0.4s ease;
        }

        .input-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            margin-bottom: 6px;
        }

        .input-group {
            margin-bottom: 12px;
        }

        /* 按钮区域 */
        .btn-area {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 16px 0;
        }

        .btn {
            padding: 10px 32px;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }

        .btn-decrypt {
            background: rgba(0, 210, 255, 0.15);
            color: #00d2ff;
            border: 1px solid rgba(0, 210, 255, 0.4);
        }

        .btn-decrypt:hover {
            background: rgba(0, 210, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 210, 255, 0.2);
        }

        .btn-encrypt {
            background: rgba(0, 255, 136, 0.12);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.35);
        }

        .btn-encrypt:hover {
            background: rgba(0, 255, 136, 0.22);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 255, 136, 0.2);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        .btn.error {
            animation: shake 0.4s ease;
            background: rgba(255, 71, 87, 0.3);
            border-color: #ff4757;
            color: #ff4757;
        }

        /* 全局提示横幅 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #ff4757;
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.85rem;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(255, 71, 87, 0.4);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* 响应式 */
        @media (max-width: 599px) {
            .container {
                padding: 16px 12px;
            }

            .main-title {
                font-size: 1.3rem;
            }

            .main-panel {
                padding: 16px 12px;
            }

            .control-row {
                gap: 10px;
            }

            .checkbox-area {
                margin-left: 0;
            }

            .btn-area {
                flex-direction: column;
                gap: 10px;
            }

            .btn {
                padding: 10px 24px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="../index.html" class="back-link">← 返回工具箱</a>
        <h1 class="main-title">SHIFT<span class="help-icon" id="helpBtn">🤔</span></h1>

        <div class="main-panel">
            <!-- 控制行：偏移量 + 选项 -->
            <div class="control-row" id="offsetArea">
                <span class="offset-label">Offset</span>
                <input type="number" class="offset-input" id="offsetInput" value="3" min="-25" max="25">
                <div class="checkbox-area">
                    <label>
                        <input type="checkbox" id="shiftDigits">
                        数字移位
                    </label>
                </div>
            </div>

            <!-- 密文输入 -->
            <div class="input-group">
                <div class="input-label">Ciphertext</div>
                <textarea class="text-input" id="cipherText" placeholder="输入密文..." rows="3"></textarea>
            </div>

            <!-- 按钮 -->
            <div class="btn-area">
                <button class="btn btn-decrypt" id="decryptBtn">↓ 解密</button>
                <button class="btn btn-encrypt" id="encryptBtn">↑ 加密</button>
            </div>

            <!-- 明文输出 -->
            <div class="input-group">
                <div class="input-label">Plaintext</div>
                <textarea class="text-input" id="plainText" placeholder="输入明文..." rows="3"></textarea>
            </div>
        </div>
    </div>

    <!-- 使用说明弹窗 -->
    <div class="modal" id="helpModal">
        <div class="modal-content">
            <span class="modal-close" id="closeModal">&times;</span>
            <h2 class="modal-title">使用说明</h2>
            <div class="modal-body">
                <p><strong>偏移量：</strong>输入 -25 到 25 之间的整数。正数右移（加密），负数左移（解密）。例如 offset=3 时 A→D、B→E。</p>
                <p><strong>解密：</strong>在 Ciphertext 框中输入文本，点击"↓ 解密"得到明文。</p>
                <p><strong>加密：</strong>在 Plaintext 框中输入文本，点击"↑ 加密"得到密文。</p>
                <p><strong>大小写：</strong>大写字母移位后仍为大写，小写仍为小写。</p>
                <p><strong>非字母字符：</strong>空格、标点、换行原样保留。</p>
                <p><strong>数字移位：</strong>勾选后 0-9 也按偏移量循环移位。</p>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        /* ============================================
           移位 - JavaScript
           ============================================ */

        // DOM 元素
        const helpBtn = document.getElementById('helpBtn');
        const helpModal = document.getElementById('helpModal');
        const closeModal = document.getElementById('closeModal');
        const offsetInput = document.getElementById('offsetInput');
        const offsetArea = document.getElementById('offsetArea');
        const cipherText = document.getElementById('cipherText');
        const plainText = document.getElementById('plainText');
        const shiftDigits = document.getElementById('shiftDigits');
        const decryptBtn = document.getElementById('decryptBtn');
        const encryptBtn = document.getElementById('encryptBtn');
        const toast = document.getElementById('toast');

        // 工具函数：显示横幅
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 工具函数：偏移量区域抖动
        function shakeOffsetArea() {
            offsetArea.classList.add('error');
            setTimeout(() => {
                offsetArea.classList.remove('error');
            }, 400);
        }

        // 工具函数：偏移量输入框抖动
        function shakeOffsetInput() {
            offsetInput.classList.add('error');
            setTimeout(() => {
                offsetInput.classList.remove('error');
            }, 400);
        }

        // 工具函数：文本输入框抖动
        function shakeTextInput(input) {
            input.classList.add('error');
            setTimeout(() => {
                input.classList.remove('error');
            }, 400);
        }

        // 工具函数：按钮抖动变红
        function shakeBtn(btn) {
            btn.classList.add('error');
            setTimeout(() => {
                btn.classList.remove('error');
            }, 400);
        }

        // 工具函数：验证偏移量
        function validateOffset() {
            const value = parseInt(offsetInput.value, 10);
            if (isNaN(value)) {
                shakeOffsetInput();
                showToast('偏移量必须是整数！');
                return null;
            }
            if (value < -25 || value > 25) {
                shakeOffsetInput();
                showToast('偏移量范围为 -25 ~ 25！');
                return null;
            }
            if (value === 0) {
                shakeOffsetInput();
                showToast('偏移量为 0 没有意义！');
                return null;
            }
            return value;
        }

        // 核心函数：移位单个字符
        function shiftChar(char, offset) {
            const code = char.charCodeAt(0);

            // 大写字母
            if (code >= 65 && code <= 90) {
                return String.fromCharCode(((code - 65 + offset) % 26 + 26) % 26 + 65);
            }

            // 小写字母
            if (code >= 97 && code <= 122) {
                return String.fromCharCode(((code - 97 + offset) % 26 + 26) % 26 + 97);
            }

            // 数字（可选）
            if (shiftDigits.checked && code >= 48 && code <= 57) {
                return String.fromCharCode(((code - 48 + offset) % 10 + 10) % 10 + 48);
            }

            // 其他字符原样保留
            return char;
        }

        // 核心函数：转换完整文本
        function convert(text, offset) {
            let result = '';
            for (const char of text) {
                result += shiftChar(char, offset);
            }
            return result;
        }

        // 加密
        function encrypt() {
            const offset = validateOffset();
            if (offset === null) {
                shakeBtn(encryptBtn);
                return;
            }

            const inputValue = plainText.value;
            if (inputValue.trim() === '') {
                shakeTextInput(plainText);
                shakeBtn(encryptBtn);
                showToast('你没有输入明文！');
                return;
            }

            cipherText.value = convert(inputValue, offset);
        }

        // 解密
        function decrypt() {
            const offset = validateOffset();
            if (offset === null) {
                shakeBtn(decryptBtn);
                return;
            }

            const inputValue = cipherText.value;
            if (inputValue.trim() === '') {
                shakeTextInput(cipherText);
                shakeBtn(decryptBtn);
                showToast('你没有输入密文！');
                return;
            }

            plainText.value = convert(inputValue, -offset);
        }

        // 帮助弹窗
        helpBtn.addEventListener('click', () => {
            helpModal.classList.add('show');
        });

        closeModal.addEventListener('click', () => {
            helpModal.classList.remove('show');
        });

        helpModal.addEventListener('click', (e) => {
            if (e.target === helpModal) {
                helpModal.classList.remove('show');
            }
        });

        // 偏移量输入 - blur 验证
        offsetInput.addEventListener('blur', () => {
            const value = parseInt(offsetInput.value, 10);
            if (isNaN(value)) {
                shakeOffsetInput();
                showToast('偏移量必须是整数！');
            } else if (value < -25 || value > 25) {
                shakeOffsetInput();
                showToast('偏移量范围为 -25 ~ 25！');
            }
        });

        // 解密按钮
        decryptBtn.addEventListener('click', decrypt);

        // 加密按钮
        encryptBtn.addEventListener('click', encrypt);
    </script>
</body>

</html>
