<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            var key = "theme_manual_override";
            var theme = null;
            try {
                var saved = window.localStorage.getItem(key);
                if (saved === "light" || saved === "dark") theme = saved;
            } catch (_) {}
            if (!theme) {
                var hour = new Date().getHours();
                theme = (hour >= 19 || hour < 7) ? "dark" : "light";
            }
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
    <link rel="icon" type="image/svg+xml" href="../things/cipher-icon.svg">
    <title>自定义密码表</title>
    <link rel="stylesheet" href="../theme/light-theme.css">
    <link rel="stylesheet" href="../theme/dark-theme.css">
    <link rel="stylesheet" href="../theme/common-styles.css">
    <style>

        .main-panel {
            padding: 18px;
            display: grid;
            gap: 14px;
        }

        .key-section,
        .convert-section {
            padding: 14px;
        }

        .key-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .field-label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-sub);
            font-size: 0.86rem;
        }

        .option-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 10px;
            color: var(--text-sub);
        }

        .option-row label {
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .helper-text {
            display: none;
            margin-top: 8px;
            font-size: 0.8rem;
            color: var(--text-sub);
        }

        .helper-text.show {
            display: block;
        }

        .convert-grid {
            display: grid;
            gap: 10px;
        }

        .text-input {
            min-height: 114px;
            resize: vertical;
        }

        .btn-area {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 12px;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-sub);
        }

        .modal-close:hover {
            color: var(--danger);
        }

        .modal-title {
            margin: 0 0 10px;
            color: var(--text-main);
        }

        .modal-body p {
            margin: 0 0 8px;
            color: var(--text-sub);
        }

        .key-section.error-shake {
            border-color: color-mix(in srgb, var(--danger) 58%, transparent);
        }

        @media (max-width: 700px) {
            .main-panel {
                padding: 14px;
            }

            .key-grid,
            .btn-area {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container page-enter">
        <a href="../index.html" class="back-link">← 返回工具箱</a>
        <h1 class="main-title"><span class="title-wrap">自定义密码表<span class="help-icon" id="helpBtn" title="查看帮助">🤔</span></span></h1>

        <div class="main-panel">
            <section class="key-section" id="keyArea">
                <div class="key-grid">
                    <div>
                        <label class="field-label">密文元素</label>
                        <input type="text" class="key-input" id="cipherInput" placeholder="例如: A B C D">
                    </div>
                    <div>
                        <label class="field-label">明文元素 </label>
                        <input type="text" class="key-input" id="plainInput" placeholder="例如: 1 2 3 4">
                    </div>
                </div>
                <div class="option-row">
                    <label><input type="checkbox" id="caseSensitive" checked> 不区分大小写</label>
                    <label><input type="checkbox" id="preserveUnmatched"> 保留未匹配元素</label>
                </div>
                <div class="helper-text" id="caseHelper">不区分大小写时，大小写对应同一个明文。</div>
                <div class="helper-text" id="checkboxHelper">未开启“保留未匹配元素”时，遇到未知字符会直接报错。</div>
            </section>

            <section class="convert-section">
                <div class="convert-grid">
                    <textarea class="text-input" id="cipherText" placeholder="请输入密文" rows="3"></textarea>
                    <div class="btn-area">
                        <button class="btn btn-decrypt" id="decryptBtn">↓ 解密</button>
                        <button class="btn btn-encrypt" id="encryptBtn">↑ 加密</button>
                    </div>
                    <textarea class="text-input" id="plainText" placeholder="请输入明文" rows="3"></textarea>
                </div>
            </section>
        </div>
    </div>

    <div class="modal" id="helpModal">
        <div class="modal-content">
            <span class="modal-close" id="closeModal">&times;</span>
            <h2 class="modal-title">使用说明</h2>
            <div class="modal-body">
                <p>1. 在密钥区分别输入”密文元素”和”明文元素”，元素用空格分隔。无空格时按单字符分割。</p>
                <p>2. 两侧元素数量必须一致，系统会自动构建一一映射关系。</p>
                <p>3. 输入密文点击“↓ 解密”，输入明文点击“↑ 加密”。</p>
                <p>4. 可根据需要开启“大小写敏感”与“保留未匹配元素”。</p>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../theme/theme-system.js"></script>
    <script>
        initThemeManager({ allowToggle: false });

        const helpBtn = document.getElementById('helpBtn');
        const helpModal = document.getElementById('helpModal');
        const closeModal = document.getElementById('closeModal');
        const cipherInput = document.getElementById('cipherInput');
        const plainInput = document.getElementById('plainInput');
        const caseSensitive = document.getElementById('caseSensitive');
        const preserveUnmatched = document.getElementById('preserveUnmatched');
        const caseHelper = document.getElementById('caseHelper');
        const checkboxHelper = document.getElementById('checkboxHelper');
        const cipherText = document.getElementById('cipherText');
        const plainText = document.getElementById('plainText');
        const decryptBtn = document.getElementById('decryptBtn');
        const encryptBtn = document.getElementById('encryptBtn');
        const keyArea = document.getElementById('keyArea');
        const toast = document.getElementById('toast');

        let cipherToPlainMap = {};
        let plainToCipherMap = {};

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2600);
        }

        function shakeInput(input) {
            input.classList.add('error');
            setTimeout(() => input.classList.remove('error'), 320);
        }

        function shakeBtn(btn) {
            btn.classList.add('error');
            setTimeout(() => btn.classList.remove('error'), 320);
        }

        function shakeKeyArea() {
            keyArea.classList.add('error-shake');
            keyArea.classList.add('shake');
            setTimeout(() => {
                keyArea.classList.remove('error-shake');
                keyArea.classList.remove('shake');
            }, 320);
        }

        function buildKeyMap() {
            const rawCipher = cipherInput.value.trim();
            const rawPlain = plainInput.value.trim();
            const cipherHasSpace = /\s/.test(rawCipher);
            const plainHasSpace = /\s/.test(rawPlain);
            const cipherElements = cipherHasSpace ? rawCipher.split(/\s+/).filter(Boolean) : rawCipher.split('');
            const plainElements = plainHasSpace ? rawPlain.split(/\s+/).filter(Boolean) : rawPlain.split('');

            if (cipherElements.length === 0 || plainElements.length === 0) {
                return null;
            }

            if (cipherElements.length !== plainElements.length) {
                return { error: '左右元素数量不一致，可能没有添加分隔符！' };
            }

            cipherToPlainMap = {};
            plainToCipherMap = {};

            if (caseSensitive.checked) {
                for (let i = 0; i < cipherElements.length; i += 1) {
                    const c = cipherElements[i];
                    const p = plainElements[i];
                    const cLower = c.toLowerCase();
                    const pLower = p.toLowerCase();

                    if (c !== cLower || p !== pLower) {
                        const counterpartC = cLower === c ? c.toUpperCase() : cLower;
                        const counterpartP = pLower === p ? p.toUpperCase() : pLower;
                        if (cipherToPlainMap[counterpartC] !== undefined && cipherToPlainMap[counterpartC] !== counterpartP) {
                            return { error: '你对同一个字母进行了不同的映射！' };
                        }
                    }

                    cipherToPlainMap[c] = p;
                    plainToCipherMap[p] = c;
                }
            } else {
                for (let i = 0; i < cipherElements.length; i += 1) {
                    cipherToPlainMap[cipherElements[i]] = plainElements[i];
                    plainToCipherMap[plainElements[i]] = cipherElements[i];
                }
            }

            return { success: true };
        }

        function isKeyComplete() {
            return cipherInput.value.trim() !== '' && plainInput.value.trim() !== '';
        }

        function convert(text, isDecrypt) {
            const map = isDecrypt ? cipherToPlainMap : plainToCipherMap;
            const preserve = preserveUnmatched.checked;
            const result = [];
            const preserveChars = new Set([' ', '\n']);

            function preserveCase(inputChar, mappedChar) {
                const inputIsLower = inputChar === inputChar.toLowerCase();
                const inputIsUpper = inputChar === inputChar.toUpperCase();
                const mappedIsLetter = /[a-zA-Z]/.test(mappedChar);
                if (mappedIsLetter && (inputIsLower || inputIsUpper)) {
                    return inputIsLower ? mappedChar.toLowerCase() : mappedChar.toUpperCase();
                }
                return mappedChar;
            }

            for (const char of text) {
                if (preserveChars.has(char)) {
                    result.push(char);
                } else if (char in map) {
                    result.push(preserveCase(char, map[char]));
                } else if (caseSensitive.checked) {
                    const oppositeChar = char === char.toLowerCase() ? char.toUpperCase() : char.toLowerCase();
                    if (oppositeChar in map) {
                        result.push(preserveCase(char, map[oppositeChar]));
                    } else if (preserve) {
                        result.push(char);
                    } else {
                        return { error: true, element: char };
                    }
                } else if (preserve) {
                    result.push(char);
                } else {
                    return { error: true, element: char };
                }
            }

            return { result: result.join('') };
        }

        helpBtn.addEventListener('click', () => helpModal.classList.add('show'));
        closeModal.addEventListener('click', () => helpModal.classList.remove('show'));
        helpModal.addEventListener('click', (e) => {
            if (e.target === helpModal) helpModal.classList.remove('show');
        });

        cipherInput.addEventListener('blur', () => {
            if (cipherInput.value.trim() === '') {
                shakeInput(cipherInput);
                return;
            }
            if (isKeyComplete()) {
                const result = buildKeyMap();
                if (result && result.error) {
                    shakeKeyArea();
                    showToast(result.error);
                }
            }
        });

        plainInput.addEventListener('blur', () => {
            if (plainInput.value.trim() === '') {
                shakeInput(plainInput);
                return;
            }
            if (isKeyComplete()) {
                const result = buildKeyMap();
                if (result && result.error) {
                    shakeKeyArea();
                    showToast(result.error);
                }
            }
        });

        caseSensitive.addEventListener('change', () => {
            if (isKeyComplete()) {
                const result = buildKeyMap();
                if (result && result.error) {
                    shakeKeyArea();
                    showToast(result.error);
                }
            }
            caseHelper.classList.toggle('show', caseSensitive.checked);
        });

        caseHelper.classList.add('show');

        decryptBtn.addEventListener('click', () => {
            if (!isKeyComplete()) {
                shakeKeyArea();
                shakeBtn(decryptBtn);
                showToast('你输入的密钥不完整！');
                return;
            }

            const inputValue = cipherText.value.trim();
            if (inputValue === '') {
                shakeInput(cipherText);
                shakeBtn(decryptBtn);
                showToast('你没有输入密文！');
                return;
            }

            const result = buildKeyMap();
            if (result && result.error) {
                shakeKeyArea();
                shakeBtn(decryptBtn);
                showToast(result.error);
                return;
            }

            const convertResult = convert(inputValue, true);
            if (convertResult.error) {
                checkboxHelper.classList.add('show');
                shakeBtn(decryptBtn);
                showToast(`密文中出现了密钥中不存在的元素：${convertResult.element}`);
                return;
            }

            checkboxHelper.classList.remove('show');
            plainText.value = convertResult.result;
        });

        encryptBtn.addEventListener('click', () => {
            if (!isKeyComplete()) {
                shakeKeyArea();
                shakeBtn(encryptBtn);
                showToast('你输入的密钥不完整！');
                return;
            }

            const inputValue = plainText.value.trim();
            if (inputValue === '') {
                shakeInput(plainText);
                shakeBtn(encryptBtn);
                showToast('你没有输入明文！');
                return;
            }

            const result = buildKeyMap();
            if (result && result.error) {
                shakeKeyArea();
                shakeBtn(encryptBtn);
                showToast(result.error);
                return;
            }

            const convertResult = convert(inputValue, false);
            if (convertResult.error) {
                checkboxHelper.classList.add('show');
                shakeBtn(encryptBtn);
                showToast(`明文中出现了密钥中不存在的元素：${convertResult.element}`);
                return;
            }

            checkboxHelper.classList.remove('show');
            cipherText.value = convertResult.result;
        });
    </script>
</body>
</html>
