<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一对一密码表</title>
    <style>
        /* ============================================
           一对一密码表 - 样式表
           ============================================ */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #fce4ec;
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: transparent;
            border-radius: 12px;
            padding: 30px;
        }

        /* 返回链接 */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #3498db;
            text-decoration: none;
            font-size: 0.95rem;
            margin-bottom: 20px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #2980b9;
        }

        /* 标题 */
        .main-title {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 16px;
        }

        /* 标题下方提示 */
        .title-hint {
            text-align: center;
            font-size: 0.85rem;
            color: #6c757d;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 8px;
            padding: 10px 16px;
            margin-bottom: 24px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 分割线 */
        .divider {
            border: none;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            margin: 24px 0;
        }

        /* 密钥区域 */
        .key-section {
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            padding: 12px 20px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #34495e;
            margin-bottom: 12px;
            text-align: center;
        }

        .section-hint {
            display: inline-block;
            text-align: left;
            font-size: 0.8rem;
            color: #6c757d;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 6px;
            padding: 6px 12px;
            margin-bottom: 8px;
            max-width: 740px;
        }

        .key-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 20px;
            border: 2px solid transparent;
            border-radius: 10px;
            transition: border-color 0.3s;
        }

        .key-area.error {
            border-color: #e74c3c;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .key-input {
            flex: 1;
            min-width: 200px;
            max-width: 350px;
            padding: 14px 18px;
            font-size: 1rem;
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .key-input:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
        }

        .key-input.error {
            border-color: #e74c3c;
            animation: shake 0.4s ease;
        }

        .arrow {
            font-size: 1.4rem;
            color: #7f8c8d;
            user-select: none;
        }

        /* 转换区域 */
        .convert-section {
            margin-top: 24px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            padding: 20px;
        }

        .checkbox-area {
            margin-bottom: 16px;
        }

        .checkbox-area label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            color: #555;
        }

        .checkbox-area input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-helper {
            display: none;
            font-size: 0.8rem;
            color: #e74c3c;
            margin-left: 8px;
        }

        .checkbox-helper.show {
            display: inline;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .input-row:last-child {
            margin-bottom: 0;
        }

        .text-input {
            flex: 1;
            padding: 16px 18px;
            font-size: 1rem;
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: rgba(255, 255, 255, 0.7);
        }

        .text-input:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
        }

        .text-input.error {
            border-color: #e74c3c;
            animation: shake 0.4s ease;
        }

        .textarea-input {
            resize: vertical;
            min-height: 80px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .small-btn {
            padding: 10px 16px;
            font-size: 0.85rem;
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.7);
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .small-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: #3498db;
            color: #3498db;
        }

        .small-btn:active {
            transform: scale(0.98);
        }

        /* 按钮区域 */
        .btn-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .btn {
            padding: 14px 40px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-decrypt {
            background: #3498db;
            color: #fff;
        }

        .btn-decrypt:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }

        .btn-encrypt {
            background: #27ae60;
            color: #fff;
        }

        .btn-encrypt:hover {
            background: #219a52;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        .btn.error {
            animation: shake 0.4s ease;
            background: #e74c3c;
        }

        /* 全局提示横幅 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #e74c3c;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.95rem;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* 响应式 */
        @media (max-width: 599px) {
            .container {
                padding: 16px 12px;
            }

            .main-title {
                font-size: 1.4rem;
            }

            .key-section,
            .convert-section {
                padding: 16px 12px;
            }

            .key-area {
                flex-direction: column;
                gap: 10px;
            }

            .arrow {
                transform: rotate(90deg);
            }

            .key-input {
                width: 100%;
                min-width: unset;
                max-width: unset;
            }

            .input-row {
                flex-direction: column;
                gap: 8px;
            }

            .text-input {
                width: 100%;
            }

            .small-btn {
                width: 100%;
            }

            .btn-area {
                flex-direction: column;
                gap: 12px;
            }

            .btn {
                padding: 12px 28px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-link">← 返回工具箱</a>
        <h1 class="main-title">一对一密码表</h1>

        <!-- 密钥区域 -->
        <section class="key-section">
            <h2 class="section-title">密钥区域</h2>
            <div class="key-area" id="keyArea">
                <input type="text" class="key-input" id="cipherInput" placeholder="请输入密文元素">
                <span class="arrow">→</span>
                <input type="text" class="key-input" id="plainInput" placeholder="请输入明文元素">
            </div>
        </section>

        <!-- 转换区域 -->
        <section class="convert-section">
            <h2 class="section-title">解密区域</h2>
            <div class="checkbox-area">
                <label>
                    <input type="checkbox" id="caseSensitive" checked>
                    大小写自动对应
                </label>
                <span class="checkbox-helper" id="caseHelper">👈取消这个按钮使大小写单独对应</span>
            </div>
            <div class="checkbox-area">
                <label>
                    <input type="checkbox" id="preserveUnmatched">
                    保留未匹配元素
                </label>
                <span class="checkbox-helper" id="checkboxHelper">👈可以选择这个按钮忽略密钥对中不存在的元素</span>
            </div>
            <div class="input-row">
                <textarea class="text-input textarea-input" id="cipherText" placeholder="请输入密文" rows="3"></textarea>
            </div>
            <div class="btn-area">
                <button class="btn btn-decrypt" id="decryptBtn">↓ 解密</button>
                <button class="btn btn-encrypt" id="encryptBtn">↑ 加密</button>
            </div>
            <div class="input-row">
                <textarea class="text-input textarea-input" id="plainText" placeholder="请输入明文" rows="3"></textarea>
            </div>
        </section>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        /* ============================================
           一对一密码表 - JavaScript
           ============================================ */

        // DOM 元素
        const cipherInput = document.getElementById('cipherInput');
        const plainInput = document.getElementById('plainInput');
        const keyArea = document.getElementById('keyArea');
        const cipherText = document.getElementById('cipherText');
        const plainText = document.getElementById('plainText');
        const preserveUnmatched = document.getElementById('preserveUnmatched');
        const caseSensitive = document.getElementById('caseSensitive');
        const caseHelper = document.getElementById('caseHelper');
        const decryptBtn = document.getElementById('decryptBtn');
        const encryptBtn = document.getElementById('encryptBtn');
        const toast = document.getElementById('toast');
        const checkboxHelper = document.getElementById('checkboxHelper');

        // 密钥映射
        let cipherToPlainMap = {};
        let plainToCipherMap = {};

        // 工具函数：显示横幅
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 工具函数：密钥区域抖动
        function shakeKeyArea() {
            keyArea.classList.add('error');
            setTimeout(() => {
                keyArea.classList.remove('error');
            }, 400);
        }

        // 工具函数：单个密钥输入框抖动
        function shakeKeyInput(input) {
            input.classList.add('error');
            setTimeout(() => {
                input.classList.remove('error');
            }, 400);
        }

        // 工具函数：文本输入框抖动
        function shakeTextInput(input) {
            input.classList.add('error');
            setTimeout(() => {
                input.classList.remove('error');
            }, 400);
        }

        // 工具函数：按钮抖动变红
        function shakeBtn(btn) {
            btn.classList.add('error');
            setTimeout(() => {
                btn.classList.remove('error');
            }, 400);
        }

        // 工具函数：分割密钥输入（去除空格后逐字符映射）
        function splitKeyInput(text) {
            return text.replace(/\s+/g, '').split('');
        }

        // 工具函数：构建密钥映射
        function buildKeyMap() {
            const cipherElements = splitKeyInput(cipherInput.value);
            const plainElements = splitKeyInput(plainInput.value);

            if (cipherElements.length === 0 || plainElements.length === 0) {
                return null;
            }

            if (cipherElements.length !== plainElements.length) {
                return { error: '左右元素数量不一致，可能没有添加分隔符！' };
            }

            cipherToPlainMap = {};
            plainToCipherMap = {};

            if (caseSensitive.checked) {
                // 检查大小写冲突
                for (let i = 0; i < cipherElements.length; i++) {
                    const c = cipherElements[i];
                    const p = plainElements[i];
                    const cLower = c.toLowerCase();
                    const pLower = p.toLowerCase();

                    if (c !== cLower || p !== pLower) {
                        // 含有大写字母，检查是否有对应的小写/大写映射冲突
                        const counterpartC = cLower === c ? c.toUpperCase() : cLower;
                        const counterpartP = pLower === p ? p.toUpperCase() : pLower;

                        if (cipherToPlainMap[counterpartC] !== undefined && cipherToPlainMap[counterpartC] !== counterpartP) {
                            return { error: '你对同一个字母进行了不同的映射！' };
                        }
                    }

                    cipherToPlainMap[c] = p;
                    plainToCipherMap[p] = c;
                }
            } else {
                // 非大小写敏感模式，直接一一映射
                for (let i = 0; i < cipherElements.length; i++) {
                    cipherToPlainMap[cipherElements[i]] = plainElements[i];
                    plainToCipherMap[plainElements[i]] = cipherElements[i];
                }
            }

            return { success: true };
        }

        // 工具函数：检查密钥是否完整
        function isKeyComplete() {
            return cipherInput.value.trim() !== '' && plainInput.value.trim() !== '';
        }

        // 工具函数：转换文本（保留空格和换行，其余逐字符映射）
        function convert(text, isDecrypt) {
            const map = isDecrypt ? cipherToPlainMap : plainToCipherMap;
            const preserve = preserveUnmatched.checked;
            const result = [];

            const preserveChars = new Set([' ', '\n']);

            for (const char of text) {
                if (preserveChars.has(char)) {
                    result.push(char);
                } else if (char in map) {
                    result.push(map[char]);
                } else if (caseSensitive.checked) {
                    // 大小写敏感模式：尝试转换大小写后查找
                    const oppositeChar = char === char.toLowerCase() ? char.toUpperCase() : char.toLowerCase();
                    if (oppositeChar in map) {
                        result.push(map[oppositeChar]);
                    } else if (preserve) {
                        result.push(char);
                    } else {
                        return { error: true, element: char };
                    }
                } else if (preserve) {
                    result.push(char);
                } else {
                    return { error: true, element: char };
                }
            }

            return { result: result.join('') };
        }

        // 密钥输入 - blur 验证
        cipherInput.addEventListener('blur', () => {
            if (cipherInput.value.trim() === '') {
                shakeKeyInput(cipherInput);
            } else if (isKeyComplete()) {
                const result = buildKeyMap();
                if (result && result.error) {
                    shakeKeyArea();
                    showToast(result.error);
                }
            }
        });

        plainInput.addEventListener('blur', () => {
            if (plainInput.value.trim() === '') {
                shakeKeyInput(plainInput);
            } else if (isKeyComplete()) {
                const result = buildKeyMap();
                if (result && result.error) {
                    shakeKeyArea();
                    showToast(result.error);
                }
            }
        });

        // 大小写敏感选项切换
        caseSensitive.addEventListener('change', () => {
            if (isKeyComplete()) {
                const result = buildKeyMap();
                if (result && result.error) {
                    shakeKeyArea();
                    showToast(result.error);
                }
            }
            // 当选中时显示提示（提示取消后的效果），未选中时隐藏
            caseHelper.classList.toggle('show', caseSensitive.checked);
        });

        // 初始化大小写提示（默认选中，所以显示提示）
        caseHelper.classList.add('show');

        // 解密按钮
        decryptBtn.addEventListener('click', () => {
            // 检查密钥完整性
            if (!isKeyComplete()) {
                shakeKeyArea();
                shakeBtn(decryptBtn);
                showToast('你输入的密钥不完整！');
                return;
            }

            // 检查密文输入
            const inputValue = cipherText.value.trim();
            if (inputValue === '') {
                shakeTextInput(cipherText);
                shakeBtn(decryptBtn);
                showToast('你没有输入密文！');
                return;
            }

            // 构建映射
            const result = buildKeyMap();
            if (result && result.error) {
                shakeKeyArea();
                shakeBtn(decryptBtn);
                showToast(result.error);
                return;
            }

            // 转换
            const convertResult = convert(inputValue, true);
            if (convertResult.error) {
                checkboxHelper.classList.add('show');
                shakeBtn(decryptBtn);
                showToast(`密文中出现了密钥中不存在的元素：${convertResult.element}`);
                return;
            }

            checkboxHelper.classList.remove('show');
            plainText.value = convertResult.result;
        });

        // 加密按钮
        encryptBtn.addEventListener('click', () => {
            // 检查密钥完整性
            if (!isKeyComplete()) {
                shakeKeyArea();
                shakeBtn(encryptBtn);
                showToast('你输入的密钥不完整！');
                return;
            }

            // 检查明文输入
            const inputValue = plainText.value.trim();
            if (inputValue === '') {
                shakeTextInput(plainText);
                shakeBtn(encryptBtn);
                showToast('你没有输入明文！');
                return;
            }

            // 构建映射
            const result = buildKeyMap();
            if (result && result.error) {
                shakeKeyArea();
                shakeBtn(encryptBtn);
                showToast(result.error);
                return;
            }

            // 转换
            const convertResult = convert(inputValue, false);
            if (convertResult.error) {
                checkboxHelper.classList.add('show');
                shakeBtn(encryptBtn);
                showToast(`明文中出现了密钥中不存在的元素：${convertResult.element}`);
                return;
            }

            checkboxHelper.classList.remove('show');
            cipherText.value = convertResult.result;
        });
    </script>
</body>
</html>
