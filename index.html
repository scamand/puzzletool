<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle苦力小工具</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- 页面主标题 -->
        <header class="main-header">
            <h1>Puzzle苦力小工具</h1>
        </header>

        <!-- 三个工具分区 -->
        <main class="tools-wrapper">

            <!-- 文字工具 -->
            <section class="tool-section">
                <div class="section-title">
                    <span class="emoji">✏️</span>
                    <h2>文字工具</h2>
                </div>
                <div class="tool-list">
                    <a href="#" class="tool-card">移位</a>
                    <a href="text-tools/cipher-table.html" class="tool-card">一对一密码表</a>
                    <a href="#" class="tool-card">固定密码</a>
                </div>
            </section>

            <hr class="divider">

            <!-- 图像工具 -->
            <section class="tool-section">
                <div class="section-title">
                    <span class="emoji">🖼️</span>
                    <h2>图像工具</h2>
                </div>
                <div class="tool-list">
                    <a href="#" class="tool-card">裁切</a>
                    <a href="#" class="tool-card">拼图</a>
                </div>
            </section>

            <hr class="divider">

            <!-- 纸笔工具 -->
            <section class="tool-section">
                <div class="section-title">
                    <span class="emoji">📝</span>
                    <h2>纸笔工具</h2>
                </div>
                <div class="tool-list">
                    <a href="#" class="tool-card">自创纸笔</a>
                </div>
            </section>

        </main>
    </div>
</body>
</html>
