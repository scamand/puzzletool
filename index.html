<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="./things/puzzle.svg">
<title>Puzzle苦力小工具</title>

<style>
:root {
    --bg: #f6f8fb;
    --card: #ffffff;
    --border: #e5e7eb;
    --text: #1f2937;
    --sub: #6b7280;
    --primary: #3b82f6;
}

/* ===== 全局 ===== */
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
}

.container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 24px 16px 40px;
}

/* ===== 标题 ===== */
.title {
    text-align: center;
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 32px;
}

/* ===== 分区 ===== */
.section {
    margin-bottom: 32px;
}

.section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 16px;
}

.section-header span {
    font-size: 22px;
}

/* 分割线 */
.divider {
    height: 1px;
    background: var(--border);
    margin: 32px 0;
}

/* ===== 工具列表 ===== */
.tool-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
}

/* ===== 工具卡片 ===== */
.tool-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 12px;
    text-align: center;
    cursor: pointer;

    transition: all 0.2s ease;
}

.tool-card a {
    text-decoration: none;
    color: var(--text);
    display: block;
}

/* hover效果 */
.tool-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.08);
}

.tool-card:hover a {
    color: var(--primary);
}

/* ===== 移动端优化 ===== */
@media (max-width: 600px) {
    .title {
        font-size: 26px;
    }

    .tool-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>
</head>

<body>
<div class="container">

    <div class="title">Puzzle苦力小工具</div>

    <!-- ===== 文字工具 ===== -->
    <div class="section">
        <div class="section-header">
            <span>🔠</span>
            <div>文字工具</div>
        </div>

        <div class="tool-grid">
            <div class="tool-card"><a href="text-tools/shift-cipher.html">移位</a></div>
            <div class="tool-card"><a href="text-tools/cipher-table.html">一对一密码表</a></div>
            <div class="tool-card"><a href="#">固定密码</a></div>
        </div>
    </div>

    <div class="divider"></div>

    <!-- ===== 图像工具 ===== -->
    <div class="section">
        <div class="section-header">
            <span>🖼️</span>
            <div>图像工具</div>
        </div>

        <div class="tool-grid">
            <div class="tool-card"><a href="#">裁切</a></div>
            <div class="tool-card"><a href="#">拼图</a></div>
        </div>
    </div>

    <div class="divider"></div>

    <!-- ===== 纸笔工具 ===== -->
    <div class="section">
        <div class="section-header">
            <span>📝</span>
            <div>纸笔工具</div>
        </div>

        <div class="tool-grid">
            <div class="tool-card"><a href="#">自创纸笔</a></div>
        </div>
    </div>

</div>
</body>
</html>
