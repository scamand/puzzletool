<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
    (function () {
        var key = "theme_manual_override";
        var theme = null;
        try {
            var saved = window.localStorage.getItem(key);
            if (saved === "light" || saved === "dark") theme = saved;
        } catch (_) {}
        if (!theme) {
            var hour = new Date().getHours();
            theme = (hour >= 19 || hour < 7) ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", theme);
    })();
</script>
<link rel="icon" type="image/svg+xml" href="./things/puzzle.svg">
<title>Puzzle苦力小工具</title>
<link rel="stylesheet" href="theme/light-theme.css">
<link rel="stylesheet" href="theme/dark-theme.css">
<link rel="stylesheet" href="theme/common-styles.css">
<style>
    .home-shell {
        width: min(980px, calc(100% - 26px));
        margin: 0 auto;
        padding: 30px 0 38px;
    }

    .title {
        text-align: center;
        font-size: clamp(1.9rem, 1.2rem + 1.8vw, 2.5rem);
        color: var(--title-main);
        text-shadow: 0 0 16px var(--title-glow);
        margin: 8px 0 30px;
        letter-spacing: 0.7px;
    }

    .section {
        margin-bottom: 30px;
    }

    .section-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
        color: var(--text-main);
        font-size: 1.2rem;
        font-weight: 700;
    }

    .divider {
        height: 1px;
        margin: 28px 0;
        background: var(--line);
    }

    .tool-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 12px;
    }

    .tool-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface-2);
        box-shadow: none;
        transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease, background-color 0.22s ease;
    }

    .tool-card a {
        display: block;
        padding: 14px 12px;
        text-decoration: none;
        color: var(--text-main);
        text-align: center;
        min-height: 44px;
    }

    .tool-card:hover {
        transform: translateY(-3px);
        border-color: var(--line-strong);
        box-shadow: var(--shadow-1);
        background: color-mix(in srgb, var(--surface-2) 86%, var(--primary-soft));
    }

    .tool-card:active {
        transform: translateY(0) scale(0.985);
        background: color-mix(in srgb, var(--surface-2) 74%, var(--primary-soft));
    }

    .tool-card:hover a {
        color: color-mix(in srgb, var(--primary) 78%, white 22%);
    }

    @media (max-width: 620px) {
        .home-shell {
            width: calc(100% - 20px);
            padding-top: 24px;
        }

        .tool-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
    }
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" title="切换主题" aria-label="切换主题" aria-pressed="false">
    <span class="theme-toggle-slider"></span>
</button>

<div class="home-shell">
    <h1 class="title">Puzzle苦力小工具</h1>

    <section class="section">
        <div class="section-header">
            <span>🔠</span>
            <div>文字工具</div>
        </div>
        <div class="tool-grid">
            <div class="tool-card"><a href="text-tools/shift-cipher.html">移位</a></div>
            <div class="tool-card"><a href="text-tools/cipher-table.html">一对一密码表</a></div>
            <div class="tool-card"><a href="text-tools/fixed-password.html">固定密码</a></div>
        </div>
    </section>

    <div class="divider"></div>

    <section class="section">
        <div class="section-header">
            <span>🖼️</span>
            <div>图像工具</div>
        </div>
        <div class="tool-grid">
            <div class="tool-card"><a href="#">裁切</a></div>
            <div class="tool-card"><a href="#">拼图</a></div>
        </div>
    </section>

    <div class="divider"></div>

    <section class="section">
        <div class="section-header">
            <span>📝</span>
            <div>纸笔工具</div>
        </div>
        <div class="tool-grid">
            <div class="tool-card"><a href="#">自创纸笔</a></div>
        </div>
    </section>
</div>

<script src="theme/theme-system.js"></script>
<script>
    initThemeManager({
        allowToggle: true,
        toggleSelector: "#themeToggle"
    });
</script>
</body>
</html>
