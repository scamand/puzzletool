<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
    (function () {
        var key = "theme_manual_override";
        var theme = null;
        try {
            var saved = window.localStorage.getItem(key);
            if (saved === "light" || saved === "dark") theme = saved;
        } catch (_) {}
        if (!theme) {
            var hour = new Date().getHours();
            theme = (hour >= 19 || hour < 7) ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", theme);
    })();
</script>
<link rel="icon" type="image/svg+xml" href="./things/puzzle.svg">
<title>Puzzle苦力小工具</title>
<link rel="stylesheet" href="theme/light-theme.css">
<link rel="stylesheet" href="theme/dark-theme.css">
<link rel="stylesheet" href="theme/common-styles.css">
<style>
    .home-shell {
        width: min(980px, calc(100% - 26px));
        margin: 0 auto;
        padding: 30px 0 38px;
    }

    .title {
        text-align: center;
        font-size: clamp(1.9rem, 1.2rem + 1.8vw, 2.5rem);
        color: var(--title-main);
        text-shadow: 0 0 16px var(--title-glow);
        margin: 8px 0 30px;
        letter-spacing: 0.7px;
    }

    .section {
        margin-bottom: 30px;
    }

    .section-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
        color: var(--text-main);
        font-size: 1.2rem;
        font-weight: 700;
    }

    .divider {
        height: 1px;
        margin: 28px 0;
        background: var(--line);
    }

    .tool-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        justify-content: start;
        gap: 10px;
    }

    .tool-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface-3);
        transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .tool-card a {
        display: block;
        padding: 11px;
        text-decoration: none;
        color: var(--text-main);
        min-height: 104px;
    }

    .tool-card:hover {
        transform: translateY(-6px);
        border-color: var(--line-strong);
        box-shadow: 0 16px 48px 8px color-mix(in srgb, var(--primary-glow) 24%, transparent);
    }

    [data-theme="light"] .tool-card:hover {
        box-shadow: 0 8px 48px 8px rgba(0, 0, 0, 0.13);
        /* inset(上 右 下 左)：上边缘贴齐元素，其余往外扩60px，保证阴影不出现在卡片上方 */
        clip-path: inset(0 -60px -60px -60px round 12px);
    }

    .tool-card:active {
        transform: translateY(0) scale(0.985);
    }

    .tool-head {
        display: flex;
        align-items: center;
        gap: 7px;
        font-weight: 600;
        margin-bottom: 4px;
    }

    .tool-desc {
        font-size: 0.78rem;
        color: var(--text-sub);
        line-height: 1.38;
    }

    @media (max-width: 620px) {
        .home-shell {
            width: calc(100% - 20px);
            padding-top: 24px;
        }

        .tool-grid {
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        }
    }
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" title="切换主题" aria-label="切换主题" aria-pressed="false">
    <span class="theme-toggle-slider"></span>
</button>

<div class="home-shell">
    <h1 class="title">Puzzle苦力小工具</h1>

    <section class="section">
        <div class="section-header">
            <span>🔠</span>
            <div>文字工具</div>
        </div>
        <div class="tool-grid">
            <div class="tool-card"><a href="text-tools/fixed-password.html">
                <div class="tool-head"><span>🔐</span><span>固定密码</span></div>
                <div class="tool-desc">摩斯、栅栏、培根等经典密码。</div>
            </a></div>
            <div class="tool-card"><a href="text-tools/shift-cipher.html">
                <div class="tool-head"><span>➡</span><span>移位</span></div>
                <div class="tool-desc">凯撒移位，字母按偏移量替换。</div>
            </a></div>
            <div class="tool-card"><a href="text-tools/cipher-table.html">
                <div class="tool-head"><span>1️⃣</span><span>自定义密码表</span></div>
                <div class="tool-desc">自定义字符映射，逐元素互译。</div>
            </a></div>
        </div>
    </section>

    <div class="divider"></div>

    <section class="section">
        <div class="section-header">
            <span>🖼️</span>
            <div>图像工具</div>
        </div>
        <div class="tool-grid">
            <div class="tool-card"><a href="#">
                <div class="tool-head"><span>✂️</span><span>裁切</span></div>
                <div class="tool-desc">按坐标裁切图像区域。</div>
            </a></div>
            <div class="tool-card"><a href="#">
                <div class="tool-head"><span>🧩</span><span>拼图</span></div>
                <div class="tool-desc">图像拼图辅助工具。</div>
            </a></div>
        </div>
    </section>

    <div class="divider"></div>

    <section class="section">
        <div class="section-header">
            <span>📝</span>
            <div>纸笔工具</div>
        </div>
        <div class="tool-grid">
            <div class="tool-card"><a href="#">
                <div class="tool-head"><span>📝</span><span>自创纸笔</span></div>
                <div class="tool-desc">自定义纸笔密码辅助。</div>
            </a></div>
        </div>
    </section>
</div>

<script src="theme/theme-system.js"></script>
<script>
    initThemeManager({
        allowToggle: true,
        toggleSelector: "#themeToggle"
    });
</script>
</body>
</html>
